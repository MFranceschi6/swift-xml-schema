# Tests/.swiftlint.yml
# Relaxed rules for test code. These overrides apply only to files under Tests/.
# Test code legitimately uses:
#   - single-character variable names (e, t, c, r) in closures and switch cases
#   - two-character type names (CK for CodingKey stubs)
#   - force-unwrap on test fixtures that are always non-nil by construction

identifier_name:
  min_length: 1
  allowed_symbols: ["_"]

type_name:
  min_length: 1
  allowed_symbols: ["_"]

force_unwrapping:
  severity: warning

type_body_length:
  warning: 600
  error: 800
