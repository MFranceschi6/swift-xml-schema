name: DocC -> GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ubuntu-22.04-spm-swift6.1-docc-${{ hashFiles('Package*.swift') }}
          restore-keys: |
            ubuntu-22.04-spm-swift6.1-docc-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      # swift-docc-plugin handles symbol graph extraction and docc conversion
      # in a single command. --allow-writing-to-directory is required because
      # the plugin writes outside the package source tree.
      - name: Generate static documentation site
        run: |
          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target SwiftXMLSchema \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path swift-xml-schema

      # Inject a root redirect so https://<owner>.github.io/swift-xml-coder/
      # immediately navigates to the documentation landing page instead of
      # showing a blank DocC SPA shell.
      - name: Add root redirect
        run: |
          REDIRECT='<script>if(location.pathname==="/swift-xml-schema/"||location.pathname==="/swift-xml-schema")location.replace("/swift-xml-schema/documentation/swiftxmlschema/");</script>'
          cat ./docs/index.html | sed "s@</head>@${REDIRECT}</head>@" > ./docs/index.html.tmp
          mv ./docs/index.html.tmp ./docs/index.html

      # Only upload the Pages artifact on push to main (not on PRs).
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
